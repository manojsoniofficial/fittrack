version: "3.9"

# ── FitTrack Pro — Test Compose ───────────────────────────────────────────────
# Used by CI pipeline and local test runs with a real PostgreSQL instance.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit
#   docker compose -f docker-compose.test.yml down -v

services:

  db_test:
    image: postgres:15-alpine
    container_name: fittrack_db_test
    environment:
      POSTGRES_USER: fittrack_test
      POSTGRES_PASSWORD: fittrack_test_pass
      POSTGRES_DB: fittrack_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fittrack_test -d fittrack_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  api_test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: fittrack_api_test
    environment:
      FLASK_ENV: testing
      DATABASE_URL: postgresql://fittrack_test:fittrack_test_pass@db_test:5432/fittrack_test
      SECRET_KEY: test-secret
      JWT_SECRET_KEY: test-jwt-secret
    depends_on:
      db_test:
        condition: service_healthy
    command: >
      pytest tests/test_api.py tests/test_suite.py
        -v --tb=short
        --cov=api --cov=models
        --cov-report=term-missing
        --cov-report=xml:/app/coverage.xml
        --cov-fail-under=80
    volumes:
      - ./coverage_reports:/app/coverage_reports
